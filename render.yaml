services:
  - type: web
    name: plagiarism-guard
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install --no-cache-dir -r plagiarism_system/requirements-prod.txt && pip uninstall -y torch torchvision torchaudio sentence-transformers transformers tokenizers triton nvidia-cublas-cu12 nvidia-cuda-cupti-cu12 nvidia-cuda-nvrtc-cu12 nvidia-cuda-runtime-cu12 nvidia-cudnn-cu12 nvidia-cufft-cu12 nvidia-curand-cu12 nvidia-cusolver-cu12 nvidia-cusparse-cu12 nvidia-nccl-cu12 nvidia-nvjitlink-cu12 nvidia-nvtx-cu12 huggingface-hub || true
    startCommand: python plagiarism_system/run.py
    envVars:
      - key: PLAGIARISM_SYSTEM_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PLAGIARISM_DISABLE_TORCH
        value: "1"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
